
<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<div th:fragment="ocupaciones-pendientes" class="ocp-card">

    <!-- Cabecera: nombre del artista + badge de estado -->
    <div class="ocp-card__header">
        <div class="ocp-card__header-top">
            <div class="ocp-card__artist-icon">
                <i class="fas fa-music"></i>
            </div>
            <div class="ocp-card__artist-info">
                <span class="ocp-card__artist-name" th:text="${ocupacion.artista}">Nombre artista</span>
                <span class="ocp-card__estado badge"
                      th:if="${ocupacion.estado == 'Reservado'}"
                      th:text="${ocupacion.estado}">Reservado</span>
            </div>
        </div>
    </div>

    <!-- Cuerpo: fecha + importe + metadatos -->
    <div class="ocp-card__body">

        <!-- Fecha destacada -->
        <div class="ocp-card__date-block">
            <i class="fas fa-calendar-day ocp-card__date-icon"></i>
            <span class="ocp-card__date-value"
                  th:text="${@dateUtils.formatLocalDateTime(ocupacion.start, 'dd/MM/yyyy')}">--/--/----</span>
        </div>

        <!-- Importe (solo si existe) -->
        <div class="ocp-card__importe-block" th:if="${ocupacion.importe != '0'}">
            <i class="fas fa-euro-sign ocp-card__importe-icon"></i>
            <span class="ocp-card__importe-value" th:text="${ocupacion.importe}">0</span>
        </div>

        <!-- Separador -->
        <hr class="ocp-card__divider"/>

        <!-- Metadatos -->
        <ul class="ocp-card__meta-list">
            <li class="ocp-card__meta-item">
                <i class="fas fa-user-tie ocp-card__meta-icon"></i>
                <span th:text="${ocupacion.nombreUsuario}">Usuario</span>
            </li>
            <li class="ocp-card__meta-item">
                <i class="fas fa-map-marker-alt ocp-card__meta-icon"></i>
                <span th:text="${(!#strings.isEmpty(ocupacion.localidad) ? ocupacion.localidad + ', ' : '') + (!#strings.isEmpty(ocupacion.municipio) ? ocupacion.municipio + ', ' : '')  + ocupacion.provincia}">Localidad</span>
            </li>
            <li class="ocp-card__meta-item ocp-card__meta-item--badges"
                th:if="${ocupacion.matinal || ocupacion.soloMatinal}">
                <i class="fas fa-sun ocp-card__meta-icon"></i>
                <span th:if="${ocupacion.matinal}" class="badge bg-primary me-1">Matinal</span>
                <span th:if="${ocupacion.soloMatinal}" class="badge bg-primary">Solo matinal</span>
            </li>
        </ul>

    </div>

    <!-- Pie: acción principal -->
    <div class="ocp-card__footer">
        <a th:href="@{'/ocupacion/{id}'(id=${ocupacion.id})}" class="ocp-card__cta">
            <i class="fas fa-eye me-1"></i> Ver ocupación
        </a>
    </div>

</div>

</html>
