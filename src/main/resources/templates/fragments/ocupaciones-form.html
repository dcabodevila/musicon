<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<form id="formNuevaOcupacion" th:fragment="ocupaciones-form" method="POST" action="#" th:object="${ocupacionDto}" autocomplete="off" th:with="tienePermisoOcupacion=${#authorization.expression('hasPermission(' + ocupacionDto.idArtista + ', ''ARTISTA'', ''OCUPACIONES'')')}">
    <fieldset th:disabled="${!tienePermisoOcupacion}">
      <input type="hidden"
           id="id-ocupacion"
           th:field="*{id}"
           aria-hidden="true"
           autocomplete="off"/>
      <div class="mb-3 row justify-content-center">
        <div class="col-sm-1">
          <a href="#" id="badge-estado-ocupacion" class="badge bg-primary me-1 my-1" th:text="*{estado}">aaa</a>
        </div>
      </div>
      <div class="d-none" aria-hidden="true">
          <select id="id-artista-modal-ocupacion" th:field="*{idArtista}" th:attr="disabled=${ocupacionDto != null}" class="form-control choices-single" required>
            <option th:each="artista : ${listaArtistas}" th:value="${artista.id}" th:text="${artista.nombre}"></option>
          </select>
      </div>



      <div class="row g-3 mb-3">
        <div class="col-12 col-md-6">
          <label for="idFechaOcupacion" class="form-label">Fecha</label>
          <input id="idFechaOcupacion" th:value="${ocupacionDto.fecha != null} ? ${#temporals.format(ocupacionDto.fecha, 'dd-MM-yyyy')} : ''" type="text" required class="form-control flatpickr flatpickr-minimum flatpickr-input active" placeholder="Fecha ocupación">
        </div>
        <div class="col-12 col-md-6">
          <label for="tipos-ocupacion" class="form-label">Tipo ocupación</label>
          <select id="tipos-ocupacion" th:field="*{idTipoOcupacion}" class="form-control choices-single" required>
            <option th:each="tipoOcupacion : ${listaTiposOcupacion}" th:value="${tipoOcupacion.id}" th:text="${tipoOcupacion.nombre}"></option>
          </select>
        </div>
        <div class="col-12">
            <label for="usuario-ocupacion" class="form-label">Representante</label>
            <input id="idUsuarioAutenticado" type="hidden" th:value="${idUsuarioAutenticado}"/>
            <select id="usuario-ocupacion" th:field="*{idUsuario}" class="form-control choices-single" required>
                <option th:each="usuario : ${listaUsuarios}" th:value="${usuario.id}" th:text="${usuario.nombreComercial != null and !usuario.nombreComercial.isEmpty()} ? ${usuario.nombreApellidos + ' (' + usuario.nombreComercial + ')'} : ${usuario.nombreApellidos}"></option>
            </select>
        </div>
        <div class="col-12">
          <label for="provisional-ocupacion" class="form-label">Localización provisional</label>
          <div class="form-check form-switch">
            <input id="provisional-ocupacion" th:field="*{provisional}" class="form-check-input" type="checkbox"  checked="false" wfd-id="id17">
          </div>
        </div>
        <div class="col-12 col-md-6">
          <label for="ccaa-ocupacion" class="form-label">Comunidad</label>
          <select id="ccaa-ocupacion" th:field="*{idCcaa}" class="form-control choices-single" required>
            <option th:each="ccaa : ${listaCcaa}" th:value="${ccaa.id}" th:text="${ccaa.nombre}"></option>
          </select>
        </div>
        <div class="col-12 col-md-6">
          <label for="provincia-ocupacion" class="form-label">Provincia</label>
          <select id="provincia-ocupacion" th:field="*{idProvincia}" class="form-control choices-single" required>
            <option th:each="provincia : ${listaProvinciasCcaaArtista}" th:value="${provincia.id}" th:text="${provincia.nombre}"></option>
          </select>
        </div>
        <div class="col-12 col-md-6">
          <label for="municipio-ocupacion" class="form-label">Municipio</label>
          <select id="municipio-ocupacion" th:field="*{idMunicipio}" class="form-control choices-single">
              <option value="">Sin especificar</option>
            <option th:each="municipio : ${listaMunicipioListado}" th:value="${municipio.id}" th:text="${municipio.nombre}"></option>
          </select>
        </div>
        <div class="col-12 col-md-6">
          <label for="localidad-ocupacion" class="form-label">Localidad</label>
          <input multiple type="text" id="localidad-ocupacion" th:field="*{localidad}" class="form-control" placeholder="Localidad"  autocomplete="off" list="localidades-list">
          <datalist id="localidades-list">
            <option th:each="localidad : ${listaLocalidadesListado}" th:value="${localidad.nombre}"></option>
          </datalist>
        </div>
        <div th:if="${#authorization.expression('hasPermission(' + ocupacionDto.idAgencia + ', ''AGENCIA'', ''VER_DATOS_ACTUACION'')')}" class="col-12">
          <div class="row g-3">
            <div class="col-12 col-md-6">
              <label for="lugar-ocupacion" class="form-label">Lugar</label>
            <input id="lugar-ocupacion" th:field="*{lugar}" class="form-control" placeholder="Lugar"  autocomplete="off">
            </div>
            <div class="col-12 col-md-6">
              <label for="observaciones-ocupacion" class="form-label">Observaciones</label>
                      <textarea class="form-control" th:field="*{observaciones}" placeholder="Observaciones" id="observaciones-ocupacion"
                                autocomplete="off" maxlength="1800"></textarea>
            </div>
          </div>
        </div>
        <div class="col-12 col-md-6">
          <label for="matinal-ocupacion" class="form-label">Matinal</label>
          <div class="form-check form-switch">
            <input id="matinal-ocupacion" th:field="*{matinal}" class="form-check-input" type="checkbox"  checked="false" wfd-id="id17">
          </div>
        </div>
        <div class="col-12 col-md-6">
          <label for="solo-matinal-ocupacion" class="form-label">Solo matinal</label>
          <div class="form-check form-switch">
            <input id="solo-matinal-ocupacion" th:field="*{soloMatinal}" class="form-check-input" type="checkbox"  checked="false" wfd-id="id17">
          </div>
        </div>
        <div th:if="${#authorization.expression('hasPermission(' + ocupacionDto.idArtista + ', ''ARTISTA'', ''VER_DATOS_ECONOMICOS'')')}" class="col-12">
          <div class="row g-3">
            <div class="col-12 col-md-4">
              <label for="importe-ocupacion" class="form-label">Importe</label>
            <input id="importe-ocupacion" th:field="*{importe}" type="number" required class="form-control"
                   placeholder="Importe" autocomplete="off" step="1" pattern="[0-9]*">
            </div>
            <div class="col-12 col-md-4">
              <label for="porcentaje-repre-ocupacion" class="form-label">Porcentaje representante</label>
            <input id="porcentaje-repre-ocupacion" th:field="*{porcentajeRepre}" type="number" required class="form-control" placeholder="Importe" autocomplete="off" step="1">
            </div>
            <div class="col-12 col-md-4">
              <label for="iva-ocupacion" class="form-label">IVA</label>
            <input id="iva-ocupacion" th:field="*{iva}" type="number" required class="form-control" placeholder="Importe" autocomplete="off" step="1">
            </div>
          </div>
        </div>
      </div>

      <div th:if="${#authorization.expression('hasPermission(' + ocupacionDto.idArtista + ', ''ARTISTA'', ''VER_DATOS_ECONOMICOS'')')}">

            <div th:if="${isArtistaPublicarEventos == true or isArtistaPermiteOdg == true}" class="card mb-3">
              <div class="card-header fw-bold">
                Publicación de eventos
<!--                <i class="fas fa-crown text-warning ms-2" title="Funcionalidad Premium"> Premium</i>-->
              </div>
              <div class="card-body">
                <div th:if="${isArtistaPermiteOdg == true}" id="warning-odg-localizacion" class="alert alert-warning d-none" role="alert">
                  <i class="fas fa-exclamation-triangle me-2"></i>
                  Esta ocupación se podrá sincronizar cuando tenga asignada provincia y municipio.
                </div>
                <div class="mb-3 row">
                  <label class="col-form-label col-sm-3 text-sm-end">Hora de actuación (opcional)</label>
                  <div class="col-sm-9">
                    <div class="d-flex gap-2 align-items-center">
                      <div class="flex-fill">
                        <label for="hora-actuacion-desde" class="form-label small text-muted mb-1">Desde</label>
                        <input id="hora-actuacion-desde" th:field="*{horaActuacionDesde}" type="time" class="form-control" placeholder="Ej: 22:00">
                      </div>
                      <div class="flex-fill">
                        <label for="hora-actuacion-hasta" class="form-label small text-muted mb-1">Hasta</label>
                        <input id="hora-actuacion-hasta" th:field="*{horaActuacionHasta}" type="time" class="form-control" placeholder="Ej: 02:00">
                      </div>
                    </div>
                    <small class="form-text text-muted">Si no se especifica, se mostrará "Horario por confirmar"</small>
                  </div>
                </div>
                <div class="mb-3 row">
                  <label for="orquestasdegalicia-ocupacion" class="col-form-label col-sm-3 text-sm-end">Info adicional evento</label>
                  <div class="col-sm-9">
                    <div class="d-flex gap-2">
                      <textarea class="form-control" th:field="*{textoOrquestasDeGalicia}"
                                th:placeholder="${isArtistaPublicarEventos == true and isArtistaPermiteOdg == true} ? 'Información a publicar en eventos de Festia y OrquestasDeGalicia.es' : (${isArtistaPermiteOdg == true} ? 'Información a publicar en OrquestasDeGalicia.es' : 'Información a publicar en eventos de Festia')"
                                id="orquestasdegalicia-ocupacion"
                                autocomplete="off" maxlength="400"></textarea>
                      <div th:if="${isArtistaPermiteOdg == true}" class="d-flex flex-column gap-2">
                        <button type="button" class="btn btn-success" id="btn-publicar-orquestas" title="Publicar en OrquestasDeGalicia.es">
                          <i class="fas fa-upload"></i>
                        </button>
                        <button type="button" class="btn btn-info" id="btn-actualizar-orquestas" title="Actualizar en OrquestasDeGalicia.es">
                          <i class="fas fa-sync-alt"></i>
                        </button>
                        <button type="button" class="btn btn-danger" id="btn-eliminar-orquestas" title="Eliminar en OrquestasDeGalicia.es">
                          <i class="fas fa-trash-alt"></i>
                        </button>
                      </div>
                      <div th:if="${isArtistaPublicarEventos == true}" class="d-flex flex-column gap-2">
                        <button type="button" id="btn-toggle-visibilidad"
                                th:classappend="${ocupacionDto.eventoVisible} ? 'btn btn-secondary' : 'btn btn-success'"
                                th:title="${ocupacionDto.eventoVisible} ? 'Ocultar en festia eventos' : 'Mostrar en festia eventos'"
                                th:attr="data-id-ocupacion=${ocupacionDto.id}">
                          <i class="fas" th:classappend="${ocupacionDto.eventoVisible} ? 'fa-eye-slash' : 'fa-eye'"></i>
                        </button>
                      </div>
                    </div>
                  </div>
                </div>
              </div>
            </div>

          </div>





      <div class="row card-body text-center mb-3">

        <div class="d-flex flex-column flex-sm-row justify-content-around">
          <button type="button" th:if="${#authorization.expression('hasPermission(' + ocupacionDto.idArtista + ', ''ARTISTA'', ''ANULAR_OCUPACION'')')  }" id="btn-anular-ocupacion" class="btn btn-pill btn-danger m-1 col-12 col-sm-2">Anular</button>
          <button type="button" th:if="${#authorization.expression('hasPermission(' + ocupacionDto.idAgencia + ', ''AGENCIA'', ''CONFIRMAR_OCUPACION'')')  }" id="btn-confirmar-ocupacion" class="btn btn-pill btn-success m-1 col-12 col-sm-2">Confirmar</button>
          <button type="submit"  id="btn-guardar-ocupacion" th:if="${tienePermisoOcupacion}" class="btn btn-pill btn-primary m-1 col-12 col-sm-2">Guardar</button>

        </div>
      </div>
    </fieldset>
</form>
