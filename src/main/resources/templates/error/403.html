<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:replace="~{fragments/main-template :: header-css}"></th:block>
    <title>Acceso denegado | Festia</title>
</head>
<body class="error-page">
<main class="card error-page__card">
    <section class="error-page__hero">
        <span class="error-page__status" th:text="${status ?: 403}">403</span>
        <h1 class="error-page__title">No tieness permisos para continuar</h1>
    </section>
    <section class="error-page__body">
        <p class="error-page__lead">
            Si crees que esto es un error, contacta al administrador de tu agencia para revisar tus permisos.
        </p>

        <div class="error-page__meta">
            <div><strong>Error:</strong> <span th:text="${error ?: 'Forbidden'}">Forbidden</span></div>
            <div><strong>Ruta:</strong> <span th:text="${path ?: '/403'}">/403</span></div>
            <div><strong>Fecha:</strong> <span th:text="${timestamp ?: 'N/D'}">N/D</span></div>
        </div>

        <div class="error-page__actions">
            <a href="/" class="btn btn-primary">Ir al inicio</a>
            <a href="/auth/login" class="btn btn-outline-secondary">Cambiar sesión</a>
        </div>
    </section>
</main>
</body>
</html>
