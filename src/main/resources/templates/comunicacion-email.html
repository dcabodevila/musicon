<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <title th:text="${asunto}">Comunicación de festia.es</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { 
            font-family: Arial, sans-serif; 
            margin: 0; 
            padding: 20px; 
            background-color: #f5f5f5; 
        }
        .container { 
            max-width: 600px; 
            margin: 0 auto; 
            background-color: white; 
            border-radius: 10px; 
            overflow: hidden; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.1); 
        }
        .header { 
            background-color: #ffffff; 
            color: #333333; 
            padding: 30px 20px; 
            text-align: center; 
        }
        .header h1 { 
            margin: 0; 
            font-size: 24px; 
            color: #333333; 
        }
        .content { 
            padding: 40px 20px; 
        }
        .message { 
            font-size: 16px; 
            color: #333; 
            line-height: 1.6; 
        }
        /* Estilos para contenido HTML de Quill */
        .message p { 
            margin: 0 0 15px 0; 
        }
        .message ul, .message ol {
            margin: 15px 0;
            padding-left: 30px;
        }
        .message li {
            margin: 5px 0;
        }
        .message blockquote {
            border-left: 4px solid #007bff;
            margin: 15px 0;
            padding: 10px 20px;
            background-color: #f8f9fa;
            color: #555;
        }
        .message code {
            background-color: #f4f4f4;
            padding: 2px 6px;
            border-radius: 3px;
            font-family: 'Courier New', monospace;
            font-size: 14px;
        }
        .message pre {
            background-color: #f4f4f4;
            padding: 15px;
            border-radius: 5px;
            overflow-x: auto;
        }
        .message a {
            color: #007bff;
            text-decoration: underline;
        }
        .footer { 
            background-color: #f8f9fa; 
            padding: 20px; 
            text-align: center; 
            font-size: 14px; 
            color: #666; 
            border-top: 1px solid #e9ecef;
        }
        .footer a { 
            color: #007bff; 
            text-decoration: none; 
        }
        .footer strong {
            color: #333;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <img src="https://res.cloudinary.com/hseoceuyz/image/upload/v1754229791/logo-name-transparente_mini_yfdyvi.png" alt="festia.es" style="height: 70px; margin-bottom: 15px;"/>
    </div>
    <div class="content">
        <!-- Contenido HTML del mensaje (no escapado) -->
        <div class="message" th:utext="${mensaje}">
            Aquí va el contenido del mensaje en HTML
        </div>
    </div>
    <div class="footer">
        <p>Este es un mensaje automático de <strong>festia.es</strong></p>
        <p>Si tienes alguna pregunta, contacta con nosotros en <a href="mailto:info@festia.es">info@festia.es</a></p>
        <p th:if="${urlBaja != null}" style="margin-top: 15px; font-size: 12px;">
            Si prefieres dejar de recibir estos emails:<br>
            <a th:href="${urlBaja}">darte de baja de las comunicaciones</a>
        </p>
    </div>
</div>
</body>
</html>
