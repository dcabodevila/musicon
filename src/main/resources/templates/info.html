<!DOCTYPE html>
<html lang="es" xmlns="http://www.w3.org/1999/xhtml"
      xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
    <title th:text="${titulo}">Gestión de orquestas y artistas para fiestas y eventos | festia.es</title>
    <meta charset="utf-8"/>
    <meta http-equiv="X-UA-Compatible" content="IE=edge"/>
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no"/>
    <meta name="description" th:content="${descripcion}"/>
    <meta name="robots" th:content="${metaRobots}"/>
    <link rel="canonical" th:href="${canonicalUrl}"/>

    <!-- Open Graph -->
    <meta property="og:title" th:content="${titulo}"/>
    <meta property="og:description" th:content="${descripcion}"/>
    <meta property="og:type" content="website"/>
    <meta property="og:url" th:content="${canonicalUrl}"/>
    <meta property="og:image" th:content="${ogImage}"/>
    <meta property="og:locale" content="es_ES"/>
    <meta property="og:site_name" content="Festia"/>

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image"/>
    <meta name="twitter:title" th:content="${titulo}"/>
    <meta name="twitter:description" th:content="${descripcion}"/>
    <meta name="twitter:image" th:content="${ogImage}"/>

    <!-- JSON-LD Structured Data -->
    <script th:if="${jsonLd != null}" type="application/ld+json" th:utext="${jsonLd}"></script>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"/>
    <link th:href="@{/leaflet/leaflet.css}" rel="stylesheet"></link>
    <link th:href="@{/css/main.css}" rel="stylesheet"></link>

    <th:block th:replace="~{fragments/google-analytics :: gtm-head}"/>
    <th:block th:replace="~{fragments/google-analytics :: ga4-head}"/>

</head>

<body>
<th:block th:replace="~{fragments/google-analytics :: gtm-body}"/>
    <h1 class="seo-h1">Gestión de orquestas y artistas para fiestas y eventos en España | festia.es</h1>
    <div th:replace="~{info-content}"></div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script th:src="@{/leaflet/leaflet.js}"></script>
    <script th:src="@{/js/info-ccaa-map.js}"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
            const revealItems = document.querySelectorAll('[data-reveal]');

            revealItems.forEach((item, index) => {
                item.style.setProperty('--reveal-delay', item.dataset.revealDelay || (index % 6) * 60 + 'ms');
            });

            if (!reduceMotion && 'IntersectionObserver' in window) {
                const revealObserver = new IntersectionObserver((entries, observer) => {
                    entries.forEach(entry => {
                        if (entry.isIntersecting) {
                            entry.target.classList.add('is-revealed');
                            observer.unobserve(entry.target);
                        }
                    });
                }, { threshold: 0.14, rootMargin: '0px 0px -8% 0px' });

                revealItems.forEach(item => revealObserver.observe(item));
            } else {
                revealItems.forEach(item => item.classList.add('is-revealed'));
            }

            const hero = document.querySelector('.info-hero');
            const heroMedia = document.querySelector('.info-hero__media');
            if (!reduceMotion && hero && heroMedia) {
                let rafId;
                const updateParallax = () => {
                    const rect = hero.getBoundingClientRect();
                    const offset = Math.max(-40, Math.min(40, rect.top * -0.08));
                    heroMedia.style.transform = `scale(1.06) translate3d(0, ${offset}px, 0)`;
                    rafId = null;
                };

                window.addEventListener('scroll', () => {
                    if (!rafId) {
                        rafId = requestAnimationFrame(updateParallax);
                    }
                }, { passive: true });
                updateParallax();
            }

            const counterEls = document.querySelectorAll('.info-counter[data-count-target]');
            const formatES = new Intl.NumberFormat('es-ES');

            const animateCounter = (el) => {
                if (el.dataset.counted === 'true') return;
                el.dataset.counted = 'true';

                const target = parseInt(el.dataset.countTarget || '0', 10);
                if (!Number.isFinite(target) || target <= 0 || reduceMotion) {
                    el.textContent = formatES.format(Math.max(0, target || 0));
                    return;
                }

                const duration = 1200;
                const start = performance.now();

                const step = (now) => {
                    const progress = Math.min((now - start) / duration, 1);
                    const eased = 1 - Math.pow(1 - progress, 3);
                    const current = Math.round(target * eased);
                    el.textContent = formatES.format(current);
                    if (progress < 1) requestAnimationFrame(step);
                };

                requestAnimationFrame(step);
            };

            if (counterEls.length > 0 && 'IntersectionObserver' in window && !reduceMotion) {
                const counterObserver = new IntersectionObserver((entries, observer) => {
                    entries.forEach(entry => {
                        if (entry.isIntersecting) {
                            animateCounter(entry.target);
                            observer.unobserve(entry.target);
                        }
                    });
                }, { threshold: 0.35 });

                counterEls.forEach(el => counterObserver.observe(el));
            } else {
                counterEls.forEach(animateCounter);
            }
        });
    </script>

</body>
</html>
