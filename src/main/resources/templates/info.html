<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
    <title>festia.es - Gestión de artistas y eventos</title>
    <meta charset="utf-8"/>
    <meta http-equiv="X-UA-Compatible" content="IE=edge"/>
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no"/>
    <meta name="description" content="festia.es - El punto de encuentro entre agencias, artistas y representantes"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <link th:href="@{/css/main.css}" rel="stylesheet"></link>

    <style>


    </style>

</head>

<body>
    <div th:replace="~{info-content}"></div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Scroll Animation with Intersection Observer
        document.addEventListener('DOMContentLoaded', function() {
            const observerOptions = {
                root: null,
                rootMargin: '0px 0px -50px 0px',
                threshold: 0.1
            };

            const observer = new IntersectionObserver((entries, observer) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        const element = entry.target;
                        const animationClass = element.dataset.scrollAnimation || 'animate__fadeInUp';
                        const delay = element.dataset.scrollDelay || '0s';

                        element.style.animationDelay = delay;
                        element.classList.add('animate__animated', animationClass);
                        element.classList.add('scroll-animated');

                        observer.unobserve(element);
                    }
                });
            }, observerOptions);

            // Observe all elements with data-scroll-animate
            document.querySelectorAll('[data-scroll-animate]').forEach(el => {
                observer.observe(el);
            });
        });
    </script>

</body>
</html>
